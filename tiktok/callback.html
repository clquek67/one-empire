<script>
(function () {
  const N8N_WEBHOOK = 'https://n8n.one-empire.com/webhook/one-empire-tiktok-oauth';

  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const state = params.get('state');
  const error = params.get('error') || params.get('error_code');
  const errorDesc = params.get('error_description') || '';

  const titleEl   = document.getElementById('title');
  const statusEl  = document.getElementById('status');
  const spinnerEl = document.getElementById('spinner');
  const successEl = document.getElementById('icon-success');
  const errorEl   = document.getElementById('icon-error');
  const messageEl = document.getElementById('message');
  const detailEl  = document.getElementById('detail');

  function showSuccess(msg, detail) {
    spinnerEl.style.display = 'none';
    successEl.style.display = 'flex';
    titleEl.textContent = 'TikTok Connected!';
    statusEl.textContent = 'Authorisation successful';
    messageEl.textContent = msg || 'Your TikTok account has been connected. You can now close this window.';
    if (detail) detailEl.textContent = detail;
  }

  function showError(msg, detail) {
    spinnerEl.style.display = 'none';
    errorEl.style.display = 'flex';
    titleEl.textContent = 'Connection Failed';
    statusEl.textContent = 'Something went wrong';
    messageEl.textContent = msg || 'Unable to connect your TikTok account. Please try again.';
    if (detail) detailEl.textContent = detail;
  }

  if (error) {
    showError('TikTok did not grant access.', errorDesc || error);
    return;
  }

  if (!code) {
    showError('No authorisation code received from TikTok.');
    return;
  }

  const memberEmail = state ? decodeURIComponent(state) : '';

  fetch(N8N_WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      code: code,
      member_email: memberEmail,
      redirect_uri: window.location.origin + '/tiktok/callback'
    })
  })
  .then(function (res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(function (data) {
    if (data && data.success === false) {
      showError(data.message || 'Token exchange failed.', data.error || '');
    } else {
      showSuccess(
        'Your TikTok account has been connected to One Empire.',
        memberEmail ? 'Account: ' + memberEmail : ''
      );
    }
  })
  .catch(function (err) {
    showError('Could not complete the connection. Please try again.', err.message);
  });
})();
</script>
