<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Connecting LinkedIn | One Empire</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root { --navy: #050D1A; --gold: #E8B84B; --gold-dim: #C9993A; --white: #F0F6FF; --white-dim: rgba(240,246,255,0.65); --border: rgba(201,153,58,0.25); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.card { background: #0D1C38; border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2rem; max-width: 480px; width: 100%; text-align: center; }
.logo { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--gold); letter-spacing: 0.15em; margin-bottom: 2rem; }
.icon { font-size: 3rem; margin-bottom: 1rem; }
h1 { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--white); margin-bottom: 0.5rem; }
p { color: var(--white-dim); font-size: 0.95rem; line-height: 1.6; }
.status { margin-top: 1.5rem; padding: 1rem; border-radius: 10px; font-size: 0.9rem; font-weight: 500; }
.status.loading { background: rgba(232,184,75,0.1); border: 1px solid var(--border); color: var(--gold); }
.status.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; }
.status.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">ONE EMPIRE</div>
  <div class="icon">💼</div>
  <h1 id="title">Connecting LinkedIn...</h1>
  <p id="subtitle">Please wait while we connect your account.</p>
  <div class="status loading" id="status"><span class="spinner"></span> Processing your connection...</div>
</div>
<script>
async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');
  if (error) { showError('LinkedIn authorisation was cancelled or failed.'); return; }
  if (!code) { showError('No authorisation code received from LinkedIn.'); return; }
  try {
    const response = await fetch('https://n8n.one-empire.com/webhook/one-empire-linkedin-oauth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, state, redirect_uri: 'https://brief.one-empire.com/linkedin/callback' })
    });
    if (response.ok) { showSuccess(); } else { showError('Connection failed. Please try again.'); }
  } catch(e) { showError('Network error. Please check your connection and try again.'); }
}
function showSuccess() {
  document.getElementById('title').textContent = 'LinkedIn Connected!';
  document.getElementById('subtitle').textContent = 'Your LinkedIn account is now connected to One Empire. Your content will be posted automatically.';
  const status = document.getElementById('status');
  status.className = 'status success';
  status.innerHTML = '✅ Connected successfully';
}
function showError(msg) {
  document.getElementById('title').textContent = 'Connection Failed';
  document.getElementById('subtitle').textContent = msg;
  const status = document.getElementById('status');
  status.className = 'status error';
  status.innerHTML = '❌ ' + msg;
}
handleCallback();
</script>
</body>
</html>
