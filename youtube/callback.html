<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting YouTube — One Empire</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #050D1A; color: #F0F6FF; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #0A1829; border: 1px solid rgba(232,184,75,0.2); border-radius: 16px; padding: 48px 40px; max-width: 460px; width: calc(100% - 48px); text-align: center; }
    .logo-mark { margin: 0 auto 24px; } .logo-mark img { height: 56px; width: auto; }
    h1 { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .status { font-size: 15px; color: #8BA0BC; margin-bottom: 32px; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(232,184,75,0.2); border-top-color: #E8B84B; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon-success { width: 52px; height: 52px; background: rgba(34,197,94,0.15); border: 2px solid rgba(34,197,94,0.5); border-radius: 50%; display: none; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 22px; }
    .icon-error { width: 52px; height: 52px; background: rgba(239,68,68,0.15); border: 2px solid rgba(239,68,68,0.5); border-radius: 50%; display: none; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 22px; }
    .message { font-size: 15px; line-height: 1.6; opacity: 0.85; }
    .detail { font-size: 13px; color: #8BA0BC; margin-top: 12px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-mark"><img src="/one-empire-logo.jpg" alt="One Empire" /></div>
  <h1 id="title">Connecting YouTube</h1>
  <p class="status" id="status">Exchanging authorisation code&hellip;</p>
  <div class="spinner" id="spinner"></div>
  <div class="icon-success" id="icon-success">&#10003;</div>
  <div class="icon-error" id="icon-error">&#10005;</div>
  <p class="message" id="message"></p>
  <p class="detail" id="detail"></p>
</div>
<script>
(function () {
  var N8N_WEBHOOK = 'https://n8n.one-empire.com/webhook/one-empire-youtube-oauth';
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code'), state = params.get('state');
  var error = params.get('error'), errorDesc = params.get('error_description') || '';
  var titleEl = document.getElementById('title'), statusEl = document.getElementById('status');
  var spinnerEl = document.getElementById('spinner'), successEl = document.getElementById('icon-success');
  var errorEl = document.getElementById('icon-error'), messageEl = document.getElementById('message'), detailEl = document.getElementById('detail');

  function showSuccess(msg, detail) {
    spinnerEl.style.display = 'none'; successEl.style.display = 'flex';
    titleEl.textContent = 'YouTube Connected!'; statusEl.textContent = 'Authorisation successful';
    messageEl.textContent = msg || 'Your YouTube account has been connected. Redirecting you back...';
    if (detail) detailEl.textContent = detail;
    setTimeout(function() { window.location.href = 'https://brief.one-empire.com/?youtube=connected'; }, 3000);
  }

  function showError(msg, detail) {
    spinnerEl.style.display = 'none'; errorEl.style.display = 'flex';
    titleEl.textContent = 'Connection Failed'; statusEl.textContent = 'Something went wrong';
    messageEl.textContent = msg || 'Unable to connect your YouTube account. Please try again.';
    if (detail) detailEl.textContent = detail;
  }

  if (error) { showError('Google did not grant access.', errorDesc || error); return; }
  if (!code) { showError('No authorisation code received from Google.'); return; }

  var memberEmail = state ? decodeURIComponent(state) : '';
  fetch(N8N_WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ code: code, member_email: memberEmail, redirect_uri: 'https://brief.one-empire.com/youtube/callback' })
  })
  .then(function(res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
  .then(function(data) {
    if (data && data.success === false) showError(data.message || 'Token exchange failed.', data.error || '');
    else showSuccess('Your YouTube account has been connected to One Empire.', memberEmail ? 'Account: ' + memberEmail : '');
  })
  .catch(function(err) { showError('Could not complete the connection. Please try again.', err.message); });
})();
</script>
</body>
</html>
